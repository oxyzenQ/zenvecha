name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.detect.outputs.core }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect core file changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            HEAD="${{ github.sha }}"
          fi
          FILES=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git ls-files)
          if echo "$FILES" | grep -qE '\.(rs|toml)$|Cargo\.lock$|^build\.rs$|^rust-toolchain|^scripts/|^\.cargo/'; then
            echo "core=true" >> "$GITHUB_OUTPUT"
          else
            echo "core=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: changes
    name: Codespell + YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install codespell + yamllint
        run: pip install codespell yamllint

      - name: Run codespell
        run: codespell

      - name: Run yamllint
        run: yamllint .github/workflows/

      - name: Run actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          ~/go/bin/actionlint .github/workflows/*.yml

  gatekeeper:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    name: Build + Test + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache prebuilt tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-v0.22.2
        id: cache-audit

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-v0.19.1
        id: cache-deny

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        env:
          VER: v0.22.2
          ARCH: x86_64-unknown-linux-musl
        run: |
          URL="https://github.com/rustsec/rustsec/releases"
          URL="${URL}/download/cargo-audit%2F${VER}"
          URL="${URL}/cargo-audit-${ARCH}-${VER}.tgz"
          curl -sL "${URL}" | tar xz -C /tmp
          mkdir -p ~/.cargo/bin
          cp "/tmp/cargo-audit-${ARCH}-${VER}/cargo-audit" \
            ~/.cargo/bin/
          chmod +x ~/.cargo/bin/cargo-audit

      - name: Install cargo-deny
        if: steps.cache-deny.outputs.cache-hit != 'true'
        env:
          VER: 0.19.1
          ARCH: x86_64-unknown-linux-musl
        run: |
          URL="https://github.com/EmbarkStudios/cargo-deny/releases"
          URL="${URL}/download/${VER}"
          URL="${URL}/cargo-deny-${VER}-${ARCH}.tar.gz"
          curl -sL "${URL}" | tar xz -C /tmp
          mkdir -p ~/.cargo/bin
          cp "/tmp/cargo-deny-${VER}-${ARCH}/cargo-deny" \
            ~/.cargo/bin/
          chmod +x ~/.cargo/bin/cargo-deny

      - name: Run gatekeeper
        run: ./scripts/build.sh --check-all
