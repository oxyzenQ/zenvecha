name: CI
on:
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**.toml'
      - '**.lock'
      - '.github/workflows/ci.yml'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**.toml'
      - '**.lock'
      - '.github/workflows/ci.yml'
      - 'scripts/**'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache prebuilt tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-v0.22.2
        id: cache-audit

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-v0.19.1
        id: cache-deny

      - name: Install codespell
        run: pip install codespell

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.22.2/cargo-audit-x86_64-unknown-linux-musl-v0.22.2.tgz" | tar xz -C /tmp
          mkdir -p ~/.cargo/bin
          cp /tmp/cargo-audit-x86_64-unknown-linux-musl-v0.22.2/cargo-audit ~/.cargo/bin/
          chmod +x ~/.cargo/bin/cargo-audit

      - name: Install cargo-deny
        if: steps.cache-deny.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.1/cargo-deny-0.19.1-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /tmp
          mkdir -p ~/.cargo/bin
          cp /tmp/cargo-deny-0.19.1-x86_64-unknown-linux-musl/cargo-deny ~/.cargo/bin/
          chmod +x ~/.cargo/bin/cargo-deny

      - name: Run gatekeeper
        run: ./scripts/build.sh --check-all

      - name: Check yamllint
        run: |
          pip install yamllint
          yamllint .github/workflows/

      - name: Check actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          ~/go/bin/actionlint .github/workflows/
